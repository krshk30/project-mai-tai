server {
    listen 80;
    listen [::]:80;
    server_name project-mai-tai.live www.project-mai-tai.live;

    return 301 https://project-mai-tai.live$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.project-mai-tai.live;

    ssl_certificate /etc/letsencrypt/live/project-mai-tai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/project-mai-tai.live/privkey.pem;

    return 301 https://project-mai-tai.live$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name project-mai-tai.live;

    ssl_certificate /etc/letsencrypt/live/project-mai-tai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/project-mai-tai.live/privkey.pem;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-project-mai-tai;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
