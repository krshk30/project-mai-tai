name: VPS Repo Maintenance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Maintenance action"
        required: true
        type: choice
        options:
          - inspect
          - reset_to_origin_main
          - runtime_snapshot
      confirm_reset:
        description: "Type RESET to allow reset_to_origin_main"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  vps_repo_maintenance:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_BASE64: ${{ secrets.VPS_SSH_KEY_BASE64 }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "Missing deploy secrets: VPS_HOST and VPS_USER are required."
            exit 1
          fi

          if [ -z "$VPS_SSH_KEY" ] && [ -z "$VPS_SSH_KEY_BASE64" ]; then
            echo "Missing deploy secret: add VPS_SSH_KEY or VPS_SSH_KEY_BASE64."
            exit 1
          fi

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_BASE64: ${{ secrets.VPS_SSH_KEY_BASE64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$VPS_SSH_KEY_BASE64" ]; then
            printf '%s' "$VPS_SSH_KEY_BASE64" | base64 --decode > ~/.ssh/project_mai_tai_vps
          else
            printf '%b' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/project_mai_tai_vps
          fi
          chmod 600 ~/.ssh/project_mai_tai_vps
          ssh-keygen -y -f ~/.ssh/project_mai_tai_vps >/dev/null
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Inspect or repair VPS repo
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          MODE: ${{ inputs.mode }}
          CONFIRM_RESET: ${{ inputs.confirm_reset }}
        run: |
          ssh -i ~/.ssh/project_mai_tai_vps "${VPS_USER}@${VPS_HOST}" \
            "MODE='${MODE}' CONFIRM_RESET='${CONFIRM_RESET}' bash -s" <<'EOF'
          set -euo pipefail
          cd /home/trader/project-mai-tai

          print_repo_state() {
            echo '== repo state =='
            git rev-parse --abbrev-ref HEAD
            git rev-parse HEAD
            git status --short
            echo
            echo '== diff stat =='
            git diff --stat
            echo
            mapfile -t changed_files < <(git diff --name-only)
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo 'working tree is clean'
              return
            fi

            for path in "${changed_files[@]}"; do
              echo
              echo "== diff: ${path} =="
              git diff --unified=3 -- "${path}" | sed -n '1,220p'
            done
          }

          case "${MODE}" in
            inspect)
              print_repo_state
              ;;
            reset_to_origin_main)
              if [ "${CONFIRM_RESET}" != "RESET" ]; then
                echo 'reset_to_origin_main requires confirm_reset=RESET'
                exit 1
              fi
              echo '== before reset =='
              print_repo_state
              git fetch origin
              git checkout main
              git reset --hard origin/main
              git clean -fd
              echo
              echo '== after reset =='
              print_repo_state
              ;;
            runtime_snapshot)
              python3 - <<'PY' || true
          import json
          import time
          import urllib.request
          from collections import Counter

          HEALTH_URL = "http://127.0.0.1:8100/health"
          OVERVIEW_URL = "http://127.0.0.1:8100/api/overview"
          BOTPOLYGON_URL = "http://127.0.0.1:8100/botpolygon"
          BOTS_URL = "http://127.0.0.1:8100/api/bots"


          def fetch(url: str) -> dict:
              with urllib.request.urlopen(url, timeout=10) as response:
                  return json.loads(response.read().decode("utf-8"))


          def try_fetch(url: str) -> tuple[dict | None, str | None]:
              try:
                  return fetch(url), None
              except Exception as exc:  # pragma: no cover - live ops helper
                  return None, f"{type(exc).__name__}: {exc}"


          def service_row(payload: dict, name: str) -> dict:
              for row in payload.get("services", []):
                  if str(row.get("service_name")) == name:
                      return row
              return {}


          final_health = {}
          final_health_error = None
          for attempt in range(1, 13):
              final_health, final_health_error = try_fetch(HEALTH_URL)
              strategy = service_row(final_health or {}, "strategy-engine")
              status = str(strategy.get("status", "unknown")) if final_health is not None else "fetch_error"
              observed_at = str(strategy.get("observed_at", "")) if final_health is not None else ""
              print(
                  f"health poll {attempt}: control={final_health.get('status')} "
                  f"strategy={status} observed_at={observed_at}"
                  if final_health is not None
                  else f"health poll {attempt}: fetch_error={final_health_error}"
              )
              if final_health is not None and status == "healthy":
                  break
              time.sleep(5)

          print("== /health ==")
          if final_health is None:
              print(json.dumps({"fetch_error": final_health_error}, indent=2))
          else:
              print(json.dumps(final_health, indent=2))
          overview, overview_error = try_fetch(OVERVIEW_URL)
          polygon_bot_payload, polygon_bot_error = try_fetch(BOTPOLYGON_URL)
          bots_payload, bots_error = try_fetch(BOTS_URL) if polygon_bot_payload is None else (None, None)
          print("== /api/overview summary ==")
          if overview is None:
              print(json.dumps({"fetch_error": overview_error}, indent=2))
          else:
              print(
                  json.dumps(
                      {
                          "status": overview.get("status"),
                          "counts": overview.get("counts"),
                          "reconciliation": overview.get("reconciliation"),
                      },
                      indent=2,
                  )
              )
          print("== /api/bots polygon summary ==")
          if polygon_bot_payload is not None:
              retention_states = polygon_bot_payload.get("retention_states") or []
              retention_counter = Counter(
                  str(item.get("state", "") or "unknown")
                  for item in retention_states
                  if isinstance(item, dict)
              )
              blocked_retention = [
                  str(item.get("ticker") or item.get("symbol") or "")
                  for item in retention_states
                  if isinstance(item, dict) and bool(item.get("blocks_entries"))
              ]
              degraded_retention = [
                  str(item.get("ticker") or item.get("symbol") or "")
                  for item in retention_states
                  if isinstance(item, dict) and bool(item.get("degraded_mode"))
              ]
              indicator_preview = []
              for snapshot in list(polygon_bot_payload.get("indicator_snapshots") or [])[:8]:
                  if not isinstance(snapshot, dict):
                      continue
                  indicator_preview.append(
                      {
                          "symbol": snapshot.get("symbol"),
                          "last_bar_at": snapshot.get("last_bar_at"),
                          "bar_count": snapshot.get("bar_count"),
                          "provider_status": snapshot.get("provider_status"),
                          "provider_source": snapshot.get("provider_source"),
                          "close": snapshot.get("close"),
                          "ema20": snapshot.get("ema20"),
                          "vwap": snapshot.get("vwap"),
                      }
                  )
              print(
                  json.dumps(
                      {
                          "strategy_code": "polygon_30s",
                          "watched_tickers_count": len(list(polygon_bot_payload.get("watched_tickers") or [])),
                          "watched_tickers_preview": list(polygon_bot_payload.get("watched_tickers") or [])[:12],
                          "latest_decision_at": polygon_bot_payload.get("listening_status", {}).get("latest_decision_at"),
                          "latest_bot_tick_at": polygon_bot_payload.get("listening_status", {}).get("latest_bot_tick_at"),
                          "latest_market_data_at": polygon_bot_payload.get("listening_status", {}).get("latest_market_data_at"),
                          "latest_heartbeat_at": polygon_bot_payload.get("listening_status", {}).get("latest_heartbeat_at"),
                          "listening_status": polygon_bot_payload.get("listening_status"),
                          "pending_open_symbols": list(polygon_bot_payload.get("pending_open_symbols") or []),
                          "pending_close_symbols": list(polygon_bot_payload.get("pending_close_symbols") or []),
                          "recent_intents_preview": list(polygon_bot_payload.get("recent_intents") or [])[:10],
                          "retention_state_counts": dict(retention_counter),
                          "blocked_retention_preview": blocked_retention[:12],
                          "degraded_retention_preview": degraded_retention[:12],
                          "recent_decisions_preview": list(polygon_bot_payload.get("recent_decisions") or [])[:10],
                          "indicator_snapshots_preview": indicator_preview,
                      },
                      indent=2,
                      default=str,
                  )
              )
          elif bots_payload is None:
              print(json.dumps({"fetch_error": polygon_bot_error or bots_error}, indent=2))
              bots = []
          else:
              bots = bots_payload.get("bots", [])
              polygon_bots = []
              for bot in bots:
                  haystack = json.dumps(bot, default=str).lower()
                  if "polygon_30s" in haystack or "polygon" in haystack:
                      polygon_bots.append(bot)

              if not polygon_bots:
                  print(
                      json.dumps(
                          {
                              "bot_count": len(bots),
                              "sample_bot_keys": sorted(bots[0].keys()) if bots else [],
                              "sample_bot_names": [
                                  bot.get("strategy_code")
                                  or bot.get("code")
                                  or bot.get("slug")
                                  or bot.get("name")
                                  for bot in bots[:5]
                              ],
                          },
                          indent=2,
                      )
                  )
              else:
                  for bot in polygon_bots:
                      watchlist = bot.get("watchlist") or []
                      recent_decisions = bot.get("recent_decisions") or []
                      retention_states = bot.get("retention_states") or []
                      retention_counter = Counter(
                          str(item.get("state", "") or "unknown")
                          for item in retention_states
                          if isinstance(item, dict)
                      )
                      blocked_retention = [
                          str(item.get("ticker") or item.get("symbol") or "")
                          for item in retention_states
                          if isinstance(item, dict) and bool(item.get("blocks_entries"))
                      ]
                      degraded_retention = [
                          str(item.get("ticker") or item.get("symbol") or "")
                          for item in retention_states
                          if isinstance(item, dict) and bool(item.get("degraded_mode"))
                      ]
                      indicator_preview = []
                      for snapshot in list(bot.get("indicator_snapshots") or [])[:8]:
                          if not isinstance(snapshot, dict):
                              continue
                          indicator_preview.append(
                              {
                                  "symbol": snapshot.get("symbol"),
                                  "last_bar_at": snapshot.get("last_bar_at"),
                                  "bar_count": snapshot.get("bar_count"),
                                  "provider_status": snapshot.get("provider_status"),
                                  "provider_source": snapshot.get("provider_source"),
                                  "close": snapshot.get("close"),
                                  "ema20": snapshot.get("ema20"),
                                  "vwap": snapshot.get("vwap"),
                              }
                          )
                      summary = {
                          "strategy_code": bot.get("strategy_code") or bot.get("code"),
                          "name": bot.get("name") or bot.get("slug"),
                          "state": bot.get("state"),
                          "watchlist_size": len(watchlist) if isinstance(watchlist, list) else None,
                          "watchlist_preview": watchlist[:10] if isinstance(watchlist, list) else watchlist,
                          "latest_decision_at": bot.get("latest_decision_at"),
                          "latest_bot_tick_at": bot.get("latest_bot_tick_at"),
                          "latest_market_data_at": bot.get("latest_market_data_at"),
                          "latest_heartbeat_at": bot.get("latest_heartbeat_at"),
                          "listening_status": bot.get("listening_status"),
                          "pending_open_symbols": list(bot.get("pending_open_symbols") or []),
                          "pending_close_symbols": list(bot.get("pending_close_symbols") or []),
                          "recent_intents_preview": list(bot.get("recent_intents") or [])[:10],
                          "retention_state_counts": dict(retention_counter),
                          "blocked_retention_preview": blocked_retention[:12],
                          "degraded_retention_preview": degraded_retention[:12],
                          "recent_decisions_preview": recent_decisions[:10],
                          "indicator_snapshots_preview": indicator_preview,
                      }
                      print(json.dumps(summary, indent=2, default=str))
          PY
              echo
              echo '== polygon db summary =='
              sudo -u postgres psql -d project_mai_tai -P pager=off <<'SQL' || true
                WITH polygon_intents AS (
                    SELECT ti.symbol, ti.intent_type, ti.status, ti.reason, ti.created_at
                    FROM trade_intents ti
                    JOIN strategies s ON s.id = ti.strategy_id
                    JOIN broker_accounts ba ON ba.id = ti.broker_account_id
                    WHERE s.code = '"'"'polygon_30s'"'"'
                      AND ba.name = '"'"'live:polygon_30s'"'"'
                      AND ti.created_at >= now() - interval '"'"'36 hours'"'"'
                )
                SELECT '"'"'intent_status_counts'"'"' AS section, status, count(*)::text AS value_1, '"'"''"'"' AS value_2, '"'"''"'"' AS value_3
                FROM polygon_intents
                GROUP BY status
                UNION ALL
                SELECT
                    '"'"'latest_bar_times'"'"' AS section,
                    strategy_code,
                    coalesce(to_char(max(bar_time AT TIME ZONE '"'"'America/New_York'"'"'), '"'"'YYYY-MM-DD HH24:MI:SS TZ'"'"'), '"'"''"'"') AS value_1,
                    coalesce(
                        to_char(
                            max(CASE WHEN coalesce(decision_status, '"'"''"'"') <> '"'"''"'"' THEN bar_time END) AT TIME ZONE '"'"'America/New_York'"'"',
                            '"'"'YYYY-MM-DD HH24:MI:SS TZ'"'"'
                        ),
                        '"'"''"'"'
                    ) AS value_2,
                    count(*)::text AS value_3
                FROM strategy_bar_history
                WHERE strategy_code IN ('"'"'polygon_30s'"'"', '"'"'macd_30s'"'"', '"'"'schwab_1m'"'"')
                  AND bar_time >= now() - interval '"'"'36 hours'"'"'
                GROUP BY strategy_code
                ORDER BY 1, 2;

                SELECT symbol, intent_type, status, reason, created_at AT TIME ZONE '"'"'America/New_York'"'"' AS created_et
                FROM polygon_intents
                ORDER BY created_at DESC
                LIMIT 20;

                SELECT
                    symbol,
                    bar_time AT TIME ZONE '"'"'America/New_York'"'"' AS bar_et,
                    volume,
                    trade_count,
                    decision_status,
                    decision_reason
                FROM strategy_bar_history
                WHERE strategy_code = '"'"'polygon_30s'"'"'
                  AND bar_time >= now() - interval '"'"'18 hours'"'"'
                  AND coalesce(decision_status, '"'"''"'"') <> '"'"''"'"'
                ORDER BY bar_time DESC
                LIMIT 20;
              SQL
              echo
              echo '== strategy log tail =='
              sudo tail -n 80 /var/log/project-mai-tai/strategy.log || true
              echo
              echo '== market-data log tail =='
              sudo tail -n 80 /var/log/project-mai-tai/market-data.log || true
              ;;
            *)
              echo "unknown mode: ${MODE}"
              exit 1
              ;;
          esac
          EOF
