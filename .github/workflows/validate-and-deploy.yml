name: Validate And Deploy

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:
    inputs:
      allow_live_restart:
        description: "Allow deploy during ET market hours"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -p no:cacheprovider tests/unit

      - name: Run integration and replay tests
        run: python -m pytest -p no:cacheprovider tests/integration tests/replay

      - name: Run Ruff
        run: python -m ruff check src tests

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production
    concurrency:
      group: project-mai-tai-production-deploy
      cancel-in-progress: false
    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_BASE64: ${{ secrets.VPS_SSH_KEY_BASE64 }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VPS host/user secrets are not configured. Validation will still run, but deploy is being skipped."
          elif [ -z "$VPS_SSH_KEY" ] && [ -z "$VPS_SSH_KEY_BASE64" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No SSH key secret is configured. Add VPS_SSH_KEY or VPS_SSH_KEY_BASE64. Deploy is being skipped."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce deploy window
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALLOW_LIVE_RESTART: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_live_restart || false }}
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("America/New_York"))
          is_weekday = now.weekday() < 5
          in_market_window = 7 <= now.hour < 16
          allow_live = str(os.environ.get("ALLOW_LIVE_RESTART", "false")).lower() == "true"

          if is_weekday and in_market_window and not allow_live:
              raise SystemExit(
                  "Deploy blocked during ET market hours. "
                  "Use workflow_dispatch with allow_live_restart=true only when the live restart risk is understood."
              )

          print(f"Deploy window allowed at {now.isoformat()} (allow_live_restart={allow_live})")
          PY

      - name: Prepare SSH key
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_BASE64: ${{ secrets.VPS_SSH_KEY_BASE64 }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "$VPS_SSH_KEY_BASE64" ]; then
            printf '%s' "$VPS_SSH_KEY_BASE64" | base64 --decode > ~/.ssh/project_mai_tai_vps
          else
            # `%b` tolerates secrets pasted with literal `\n`, and `tr -d '\r'`
            # normalizes Windows CRLF line endings from copy/paste.
            printf '%b' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/project_mai_tai_vps
          fi
          chmod 600 ~/.ssh/project_mai_tai_vps
          ssh-keygen -y -f ~/.ssh/project_mai_tai_vps >/dev/null
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy main to VPS
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ALLOW_LIVE_RESTART: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_live_restart || false }}
        run: |
          DEPLOY_ALLOW_LIVE=0
          if [ "$ALLOW_LIVE_RESTART" = "true" ]; then
            DEPLOY_ALLOW_LIVE=1
          fi

          ssh -i ~/.ssh/project_mai_tai_vps "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail; \
            cd /home/trader/project-mai-tai; \
            if [ -n \"\$(git status --porcelain)\" ]; then \
              echo 'refusing deploy because repo has local changes'; \
              git status --short; \
              exit 1; \
            fi; \
            git fetch origin; \
            git checkout main; \
            git merge --ff-only origin/main; \
            MAI_TAI_ALLOW_LIVE_RESTART=${DEPLOY_ALLOW_LIVE} bash ops/systemd/deploy_main.sh /home/trader/project-mai-tai main"
